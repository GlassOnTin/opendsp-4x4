# F-Droid build recipe for openDSP-4x4.
#
# Submitted to F-Droid's metadata repo as a merge request:
#   1. Fork  https://gitlab.com/fdroid/fdroiddata
#   2. Copy this file to  metadata/net.opendsp.x4x4.yml
#   3. Run  fdroid rewritemeta net.opendsp.x4x4   (drops this comment header)
#   4. Test:  fdroid build net.opendsp.x4x4:4
#   5. Open the MR.
#
# Prebuilt-binary handling (F-Droid bans prebuilt binaries in the build):
#
#   esbuild — SOLVED, build-from-source. esbuild is Go; the recipe clones it at
#   the pinned tag, `go build`s it, points npm at it via ESBUILD_BINARY_PATH
#   (esbuild honours that), deletes the prebuilt binaries npm fetched, and removes
#   the esbuild checkout before the scan. Verified locally: a `vite build` driven
#   by the from-source esbuild produces a BYTE-IDENTICAL bundle to the stock one.
#
#   Rollup native — NOT yet solved. Vite 6 uses Rollup 4, whose parser is a
#   prebuilt Rust/napi binary (@rollup/rollup-linux-x64-gnu/*.node). Until it is
#   built from source (Rust toolchain) or replaced with a from-source wasm build,
#   it is the one remaining scanignore below — so this MR is not yet policy-clean.
#   (IzzyOnDroid ships the signed GitHub-release APK and needs none of this.)

Categories:
  - Connectivity
  - Multimedia
License: AGPL-3.0-or-later
AuthorName: Ian Williams
SourceCode: https://github.com/GlassOnTin/opendsp-4x4
IssueTracker: https://github.com/GlassOnTin/opendsp-4x4/issues
Donate: https://ko-fi.com/glassontin
Liberapay: GlassOnTin

AutoName: openDSP-4x4

RepoType: git
Repo: https://github.com/GlassOnTin/opendsp-4x4.git

Builds:
  - versionName: 0.2.0
    versionCode: 4
    commit: v0.2.0
    subdir: android/app
    sudo:
      - apt-get update
      - apt-get install -y golang-go npm
    gradle:
      - yes
    prebuild:
      # build esbuild from source (Go), so npm's prebuilt binary isn't used
      - git clone --depth 1 --branch v0.25.12 https://github.com/evanw/esbuild ../../esbuild-src
      - ( cd ../../esbuild-src && go build ./cmd/esbuild )
      # install web deps without the esbuild postinstall download, then drop the
      # prebuilt esbuild binaries — ESBUILD_BINARY_PATH points at the from-source one
      - ( cd ../../web && npm ci --ignore-scripts )
      - rm -f ../../web/node_modules/esbuild/bin/esbuild ../../web/node_modules/@esbuild/*/bin/esbuild
      - ( cd ../../web && ESBUILD_BINARY_PATH="$(cd ../esbuild-src && pwd)/esbuild" VITE_TARGET=android npm run build )
      # sync the bundle into app assets and remove the build-tool source/artifact
      - mkdir -p src/main/assets/www && cp -a ../../web/dist/. src/main/assets/www/
      - rm -rf ../../esbuild-src
    scanignore:
      # only Rollup's native parser remains prebuilt; see the note at the top
      - web/node_modules/@rollup

AutoUpdateMode: Version v%v
UpdateCheckMode: Tags ^v[0-9.]+$
CurrentVersion: 0.2.0
CurrentVersionCode: 4
