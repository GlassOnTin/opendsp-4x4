# F-Droid build recipe for openDSP-4x4.
#
# Submitted to F-Droid's metadata repo as a merge request:
#   1. Fork  https://gitlab.com/fdroid/fdroiddata
#   2. Copy this file to  metadata/net.opendsp.x4x4.yml
#   3. Run  fdroid rewritemeta net.opendsp.x4x4   (drops this comment header)
#   4. Test:  fdroid build net.opendsp.x4x4:4
#   5. Open the MR.
#
# No prebuilt binaries: Vite pulls two prebuilt native binaries from npm — esbuild
# (Go) and Rollup 4's parser (Rust/napi). This recipe builds BOTH from source at
# the pinned upstream tags and makes Vite use them, then removes node_modules and
# the build-tool checkouts (they're build intermediates, not part of the APK).
# Verified locally: a `vite build` driven by the from-source esbuild AND the
# from-source Rollup native produces a BYTE-IDENTICAL bundle to the stock one — so
# there is no `scanignore`.
#
# Caveats for the buildserver run: Rollup pins Rust nightly-2025-07-25 (via its
# rust-toolchain.toml — rustup auto-installs it); the SWC compile is heavy (~1 min,
# a few GB RAM). If apt's `rustup` isn't available on the builder, install rustup
# upstream instead.

Categories:
  - Connectivity
  - Multimedia
License: AGPL-3.0-or-later
AuthorName: Ian Williams
SourceCode: https://github.com/GlassOnTin/opendsp-4x4
IssueTracker: https://github.com/GlassOnTin/opendsp-4x4/issues
Donate: https://ko-fi.com/glassontin
Liberapay: GlassOnTin

AutoName: openDSP-4x4

# Reproducible Builds: the published GitHub-release APK is signed with this key;
# F-Droid verifies its build reproduces it (content is identical apart from the
# signature) and ships this signature, so F-Droid and GitHub/IzzyOnDroid APKs match.
AllowedAPKSigningKeys: 12b4463c8a6a356c64a743ed912a047b05a210f113829de15c71b748e63fe2a1

RepoType: git
Repo: https://github.com/GlassOnTin/opendsp-4x4.git

Builds:
  - versionName: 0.2.1
    versionCode: 5
    commit: v0.2.1
    subdir: android/app
    sudo:
      - apt-get update
      - apt-get install -y golang-go rustup build-essential cmake
      # the buildserver's stock npm is too old for @napi-rs/cli's dep tree
      # ("Invalid comparator: npm:@built-in/..."); install current Node + npm
      - curl -Lo node.tar.gz https://nodejs.org/dist/v24.11.1/node-v24.11.1-linux-x64.tar.gz
      - echo "58a5ff5cc8f2200e458bea22e329d5c1994aa1b111d499ca46ec2411d58239ca  node.tar.gz" | sha256sum -c -
      - tar xzf node.tar.gz --strip-components=1 -C /usr/local/
    gradle:
      - yes
    prebuild:
      # esbuild from Go source
      - git clone --depth 1 --branch v0.25.12 https://github.com/evanw/esbuild ../../esbuild-src
      - ( cd ../../esbuild-src && go build ./cmd/esbuild )
      # Rollup 4 native parser from Rust source (rustup auto-installs the pinned nightly)
      - git clone --depth 1 --branch v4.62.0 https://github.com/rollup/rollup ../../rollup-src
      - ( cd ../../rollup-src && npm install --no-save --no-audit --no-fund @napi-rs/cli@3.4.1 && ./node_modules/.bin/napi build --cwd rust/bindings_napi --platform --release --no-js --dts native.d.ts --output-dir ../.. --package-json-path ../../package.json )
      # install web deps (no esbuild postinstall download), swap in the from-source binaries
      - ( cd ../../web && npm ci --ignore-scripts )
      - rm -f ../../web/node_modules/esbuild/bin/esbuild ../../web/node_modules/@esbuild/*/bin/esbuild
      - cp -f ../../rollup-src/rollup.linux-x64-gnu.node ../../web/node_modules/@rollup/rollup-linux-x64-gnu/rollup.linux-x64-gnu.node
      # build the bundle with the from-source esbuild, sync into app assets
      - ( cd ../../web && ESBUILD_BINARY_PATH="$(cd ../esbuild-src && pwd)/esbuild" VITE_TARGET=android npm run build )
      - mkdir -p src/main/assets/www && cp -a ../../web/dist/. src/main/assets/www/
      # remove build intermediates (none of this is in the APK)
      - rm -rf ../../esbuild-src ../../rollup-src ../../web/node_modules

AutoUpdateMode: Version
UpdateCheckMode: Tags ^v[0-9.]+$
CurrentVersion: 0.2.1
CurrentVersionCode: 5
