# F-Droid build recipe for openDSP-4x4.
#
# This file is NOT used by this repo — it is submitted to F-Droid's metadata
# repo as a merge request:
#   1. Fork  https://gitlab.com/fdroid/fdroiddata
#   2. Copy this file to  metadata/net.opendsp.x4x4.yml
#   3. Run  fdroid rewritemeta net.opendsp.x4x4   (drops this comment header; the
#      rest is already in canonical order, so it's otherwise a no-op)
#   4. Test:  fdroid build net.opendsp.x4x4:4     (needs the fdroidserver buildserver)
#   5. Open the MR.
#
# ⚠ Build-from-source caveat (verified with `fdroid scanner`): the web bundle is
# built with Vite, which pulls *prebuilt* native binaries from npm — esbuild
# (node_modules/esbuild/bin/esbuild and @esbuild/linux-x64) and Rollup
# (@rollup/rollup-linux-x64-gnu/*.node). The scanner only passes because the
# `scanignore: web/node_modules` below makes it log "Ignoring binary at …esbuild".
# F-Droid's policy disallows prebuilt binaries in the build, so reviewers are
# likely to object to that scanignore. If it can't be resolved, IzzyOnDroid (which
# ships the signed GitHub-release APK and reuses the same fastlane metadata) is the
# lower-friction route to the same F-Droid clients.

Categories:
  - Connectivity
  - Multimedia
License: AGPL-3.0-or-later
AuthorName: Ian Williams
SourceCode: https://github.com/GlassOnTin/opendsp-4x4
IssueTracker: https://github.com/GlassOnTin/opendsp-4x4/issues
Donate: https://ko-fi.com/glassontin
Liberapay: GlassOnTin

AutoName: openDSP-4x4

RepoType: git
Repo: https://github.com/GlassOnTin/opendsp-4x4.git

Builds:
  - versionName: 0.2.0
    versionCode: 4
    commit: v0.2.0
    subdir: android/app
    sudo:
      - apt-get update
      - apt-get install -y npm
    gradle:
      - yes
    prebuild:
      - pushd ../../web && npm ci && VITE_TARGET=android npm run build && popd
      - mkdir -p src/main/assets/www && cp -a ../../web/dist/. src/main/assets/www/
    scanignore:
      - web/node_modules

AutoUpdateMode: Version v%v
UpdateCheckMode: Tags ^v[0-9.]+$
CurrentVersion: 0.2.0
CurrentVersionCode: 4
