name: Android release

# Tag a release (e.g. `git tag v0.2.0 && git push --tags`) to build a signed APK
# and publish it as a GitHub Release. workflow_dispatch builds an APK artifact only.
#
# Signing (same convention as iSpindlePlotter/Haven): add repo secrets
# RELEASE_KEYSTORE_BASE64 / RELEASE_KEYSTORE_PASSWORD / RELEASE_KEY_ALIAS /
# RELEASE_KEY_PASSWORD for a real release key. Without them the build falls back to
# the debug key (still installable for sideloading).
#   keytool -genkeypair -v -keystore release.jks -alias opendsp \
#     -keyalg RSA -keysize 2048 -validity 10000
#   base64 -w0 release.jks   # -> RELEASE_KEYSTORE_BASE64

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-35 build-tools;35.0.0"

      - name: Build + verify web bundle (Android mode)
        working-directory: web
        run: |
          npm ci
          npm run typecheck
          npm test
          VITE_TARGET=android npm run build

      - name: Sync bundle into app assets
        run: |
          rm -rf android/app/src/main/assets/www
          mkdir -p android/app/src/main/assets/www
          cp -r web/dist/. android/app/src/main/assets/www/

      - name: Decode release keystore (optional)
        id: keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        if: env.RELEASE_KEYSTORE_BASE64 != ''
        run: |
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > "${{ runner.temp }}/release.jks"
          echo "path=${{ runner.temp }}/release.jks" >> "$GITHUB_OUTPUT"

      - name: Version from tag (APK filename only — the build's version is in source)
        id: ver
        run: echo "name=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build release APK
        working-directory: android
        env:
          KEYSTORE_PATH: ${{ steps.keystore.outputs.path }}
          KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew --no-daemon assembleRelease

      - name: Stage APK
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/release/app-release.apk "dist/opendsp-4x4-${{ steps.ver.outputs.name }}.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: opendsp-4x4-apk
          path: dist/*.apk

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
          generate_release_notes: true
