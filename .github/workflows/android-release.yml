name: Android release

# Tag a release (e.g. `git tag v0.2.0 && git push --tags`) to build a signed APK
# and publish it as a GitHub Release. workflow_dispatch builds an APK artifact only.
#
# Signing: add repo secrets ANDROID_KEYSTORE_BASE64 / ANDROID_KEYSTORE_PASSWORD /
# ANDROID_KEY_ALIAS / ANDROID_KEY_PASSWORD for a real release key. Without them the
# build falls back to the debug key (still installable for sideloading).
#   keytool -genkey -v -keystore release.keystore -alias opendsp \
#     -keyalg RSA -keysize 2048 -validity 10000
#   base64 -w0 release.keystore   # -> ANDROID_KEYSTORE_BASE64

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Build + verify web bundle (Android mode)
        working-directory: web
        run: |
          npm ci
          npm run typecheck
          npm test
          VITE_TARGET=android npm run build

      - name: Sync bundle into app assets
        run: |
          rm -rf android/app/src/main/assets/www
          mkdir -p android/app/src/main/assets/www
          cp -r web/dist/. android/app/src/main/assets/www/

      - name: Ensure Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0" >/dev/null

      - name: Decode signing keystore
        if: env.KEYSTORE_BASE64 != ''
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          echo "KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"

      - name: Version from tag
        id: ver
        run: echo "name=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build release APK
        working-directory: android
        run: ./gradlew --no-daemon assembleRelease -PversionName="${{ steps.ver.outputs.name }}" -PversionCode="${{ github.run_number }}"

      - name: Stage APK
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/release/app-release.apk "dist/opendsp-4x4-${{ steps.ver.outputs.name }}.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: opendsp-4x4-apk
          path: dist/*.apk

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
          generate_release_notes: true
